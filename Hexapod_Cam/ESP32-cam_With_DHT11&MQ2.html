<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Camera with Sensor Data</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background-color: #333; 
      color: #eee; 
      margin: 0; 
      padding-top: 20px; 
      display: flex; 
      flex-direction: column; 
      align-items: center;
    }
    h1 { 
      font-size: 1.5em; 
      color: #00ff00; 
      margin: 10px 0; 
      text-transform: uppercase;
    }
    .data-table {
      display: table;
      width: 100%;
      max-width: 400px;
      margin-top: 15px;
      background-color: #444; 
      border-radius: 10px; 
      padding: 15px; 
    }
    .data-row {
      display: table-row;
    }
    .data-cell {
      display: table-cell;
      padding: 8px;
      text-align: center;
      border-bottom: 1px solid #555;
    }
    .data-cell:last-child { border-bottom: none; }
    button { 
      padding: 12px 20px; 
      font-size: 16px; 
      border: none; 
      background-color: #007bff; 
      color: #fff; 
      cursor: pointer; 
      border-radius: 5px; 
      margin-top: 15px;
      width: 100%;
      max-width: 400px;
      transition: background-color 0.3s ease;
    }
    button:hover { background-color: #0056b3; }
    img { 
      width: 100%; 
      max-width: 400px; 
      border-radius: 10px; 
      margin-top: 15px;
      transform: rotate(180deg); /* Flip the image vertically */
    }
  </style>
</head>
<body>
  <h1>Camera with Sensor Data</h1>
  
  <img src="" id="photo">
  
  <button onclick="toggleFlashlight()">Toggle Flashlight</button>
  
  <div class="data-table">
    <div class="data-row">
      <div class="data-cell"><strong>🌡️ Temperature:</strong> <span id="temperature">--</span> °C</div>
    </div>
    <div class="data-row">
      <div class="data-cell"><strong>&#x1F4A7; Humidity:</strong> <span id="humidity">--</span> %</div>
    </div>
    <div class="data-row">
      <div class="data-cell"><strong>💨 Gas Level:</strong> <span id="gasLevel">--</span> ppm</div>
    </div>
  </div>

  <script>
    function updateData() {
      fetch('/data').then(response => response.json()).then(data => {
        document.getElementById("temperature").innerText = data.temperature;
        document.getElementById("humidity").innerText = data.humidity;
        document.getElementById("gasLevel").innerText = data.gasLevel;
      });
    }
    function toggleFlashlight() {
      fetch("/flash");
    }
    window.onload = function() {
      document.getElementById("photo").src = window.location.href.slice(0, -1) + ":81/stream";
      setInterval(updateData, 5000); // Update sensor data every 5 seconds
    };
  </script>
</body>
</html>
